<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work From Home Voting</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  width: 90%;
  max-width: 520px;
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

h1 {
  text-align: center;
  margin-bottom: 20px;
  color: #60a5fa;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
  outline: none;
}

.vote-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
  margin-top:10px;
}

.day-btn{
  padding:12px;
  border:none;
  border-radius:10px;
  background:#1f1f1f;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

.day-btn:hover{
  background:#333;
}

table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
  overflow:hidden;
  border-radius:10px;
}

th{
  background:#1f1f1f;
  padding:12px;
}

td{
  padding:12px;
  text-align:center;
  border-bottom:1px solid #222;
}

.badge{
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
}

.available{background:#2ecc71;}
.fullbadge{background:#e74c3c;}

#message{
  margin-top:10px;
  text-align:center;
  color:#60a5fa;
}
</style>
</head>

<body>

<div class="container">

  <h1>Work From Home Vote</h1>

  <input type="text" id="name" placeholder="Enter your name">

  <div id="voteButtons" class="vote-grid"></div>

  <div id="message"></div>

  <table>
    <thead>
      <tr>
        <th>Day</th>
        <th>People</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  addDoc,
  query,
  where,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCRBIMmOd4i-RUlvh9JE4eJkBocU2BTuro",
authDomain: "work-from-home-a417e.firebaseapp.com",
projectId: "work-from-home-a417e",
storageBucket: "work-from-home-a417e.appspot.com",
messagingSenderId: "858263718094",
appId: "1:858263718094:web:e8dd52aad6da622485a89f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const votesRef = collection(db,"votes");
const DAYS = ["Tuesday","Wednesday","Thursday","Friday","Saturday"];

const voteContainer = document.getElementById("voteButtons");
const tableBody = document.getElementById("tableBody");
const message = document.getElementById("message");

function showMessage(text){
  message.innerText = text;
  setTimeout(()=>message.innerText="",3000);
}

/* device id */
function getDeviceId(){
  let id = localStorage.getItem("device_id");
  if(!id){
    id = crypto.randomUUID();
    localStorage.setItem("device_id",id);
  }
  return id;
}

/* create buttons */
DAYS.forEach(day=>{
  const btn=document.createElement("button");
  btn.className="day-btn";
  btn.innerText=day;

  btn.onclick=()=>vote(day);
  voteContainer.appendChild(btn);
});

/* vote */
async function vote(day){

  const name=document.getElementById("name").value.trim();
  if(!name) return showMessage("Enter name");

  const deviceId=getDeviceId();

  const check = await getDocs(
    query(votesRef,where("deviceId","==",deviceId))
  );

  if(!check.empty){
    return showMessage("You already voted");
  }

  const daySnap = await getDocs(
    query(votesRef,where("day","==",day))
  );

  if(daySnap.size>=2){
    return showMessage("This day is full");
  }

  await addDoc(votesRef,{
    name:name.toLowerCase(),
    day,
    deviceId,
    createdAt:serverTimestamp()
  });

  showMessage("Vote submitted ✔");
}

/* live update */
onSnapshot(votesRef,snap=>{

  const data={};
  DAYS.forEach(d=>data[d]=[]);

  snap.forEach(doc=>{
    const v=doc.data();
    data[v.day].push(v.name);
  });

  tableBody.innerHTML="";

  DAYS.forEach(day=>{
    const people=data[day];

    tableBody.innerHTML+=`
      <tr>
        <td>${day}</td>
        <td>${people.length?people.join("<br>"):"-"}</td>
        <td>
          ${people.length>=2
            ? '<span class="badge fullbadge">FULL</span>'
            : '<span class="badge available">'+(2-people.length)+' left</span>'
          }
        </td>
      </tr>
    `;
  });

});

</script>

</body>
</html>
