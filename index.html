<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work From Home Voting</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:#000; /* BLACK BACKGROUND */
color:#fff;
padding:30px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:#111;
padding:25px;
border-radius:15px;
margin-bottom:20px;
border:1px solid #222;
}

h1{
text-align:center;
color:#fff;
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #333;
margin-top:10px;
background:#000;
color:#fff;
}

.vote-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
margin-top:15px;
}

.day-btn{
padding:15px;
border:none;
border-radius:10px;
background:#1f1f1f;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

.day-btn:hover{
background:#333;
}

.badge{
padding:5px 10px;
border-radius:20px;
color:white;
font-size:12px;
}

.available{background:#2ecc71;}
.fullbadge{background:#e74c3c;}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th{
background:#1f1f1f;
color:#fff;
padding:12px;
}

td{
padding:12px;
text-align:center;
border-bottom:1px solid #222;
}

#message{
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="card">
<h1>🏡 Work From Home</h1>

<input id="name" placeholder="Enter your name">

<div class="vote-grid" id="voteButtons"></div>

<div id="message"></div>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>Day</th>
<th>People</th>
<th>Status</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
addDoc,
query,
where,
onSnapshot,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCRBIMmOd4i-RUlvh9JE4eJkBocU2BTuro",
authDomain: "work-from-home-a417e.firebaseapp.com",
projectId: "work-from-home-a417e",
storageBucket: "work-from-home-a417e.appspot.com",
messagingSenderId: "858263718094",
appId: "1:858263718094:web:e8dd52aad6da622485a89f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const votesRef = collection(db,"votes");
const DAYS = ["Tuesday","Wednesday","Thursday","Friday","Saturday"];

const voteContainer = document.getElementById("voteButtons");
const tableBody = document.getElementById("tableBody");
const message = document.getElementById("message");

function showMessage(text){
message.innerText = text;
setTimeout(()=>message.innerText="",3000);
}

/* DEVICE ID */
function getDeviceId(){
let id = localStorage.getItem("device_id");
if(!id){
id = crypto.randomUUID();
localStorage.setItem("device_id",id);
}
return id;
}

/* BUTTONS */
DAYS.forEach(day=>{
const btn=document.createElement("button");
btn.className="day-btn";
btn.innerText=day;
btn.onclick=()=>vote(day);
voteContainer.appendChild(btn);
});

/* VOTE */
async function vote(day){

const name=document.getElementById("name").value.trim();
if(!name) return showMessage("Enter name");

const deviceId=getDeviceId();

/* one vote per device */
const check = await getDocs(
query(votesRef,where("deviceId","==",deviceId))
);

if(!check.empty){
return showMessage("This device already voted");
}

/* day limit */
const daySnap = await getDocs(
query(votesRef,where("day","==",day))
);

if(daySnap.size>=2){
return showMessage("Day is full");
}

await addDoc(votesRef,{
name:name.toLowerCase(),
day,
deviceId,
createdAt:serverTimestamp()
});

showMessage("Vote submitted");
}

/* LIVE */
onSnapshot(votesRef,snap=>{

const data={};
DAYS.forEach(d=>data[d]=[]);

snap.forEach(d=>{
const v=d.data();
data[v.day].push(v.name);
});

tableBody.innerHTML="";

DAYS.forEach(day=>{
const people=data[day];

tableBody.innerHTML+=`
<tr>
<td>${day}</td>
<td>${people.length?people.join("<br>"):"-"}</td>
<td>
${people.length>=2
? '<span class="badge fullbadge">FULL</span>'
: '<span class="badge available">'+(2-people.length)+' left</span>'}
</td>
</tr>`;
});

});

</script>

</body>
</html>
